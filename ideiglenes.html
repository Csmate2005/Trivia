<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JÁTÉKVEZETŐI TRIVIA</title>
  <link rel="icon" type="png" href="./mlsz_logo.png">
  
  <style>
    :root{
      --bg-1:#070b18;
      --bg-2:#0f172a;
      --bg-3:#1e1b4b;
      --panel:rgba(255,255,255,0.82);
      --panel-strong:rgba(255,255,255,0.96);
      --text:#0f172a;
      --muted:#5b6b84;
      --primary:#6d5dfc;
      --primary-2:#8b5cf6;
      --primary-3:#22d3ee;
      --success:#22c55e;
      --danger:#ef4444;
      --warning:#f59e0b;
      --border:rgba(148,163,184,0.18);
      --shadow:0 24px 70px rgba(15,23,42,0.16);
      --soft-glow:0 0 0 1px rgba(255,255,255,0.24) inset, 0 30px 80px rgba(99,102,241,0.16);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(99,102,241,0.22), transparent 24%),
        radial-gradient(circle at 90% 12%, rgba(34,211,238,0.18), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(168,85,247,0.12), transparent 28%),
        linear-gradient(145deg, #eef4ff 0%, #f8fbff 42%, #e7ecf7 100%);
      padding: 28px 16px 56px;
      transition: background .35s ease, color .25s ease;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 999px;
      filter: blur(70px);
      opacity: .55;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -100px;
      left: -90px;
      background: rgba(109,93,252,0.22);
    }

    body::after {
      right: -110px;
      bottom: -120px;
      background: rgba(34,211,238,0.18);
    }

    body.dark {
      --panel:rgba(10,16,30,0.72);
      --panel-strong:rgba(10,16,30,0.92);
      --text:#ecf4ff;
      --muted:#9fb0c8;
      --border:rgba(148,163,184,0.16);
      --shadow:0 26px 80px rgba(2,6,23,0.5);
      --soft-glow:0 0 0 1px rgba(255,255,255,0.05) inset, 0 30px 80px rgba(79,70,229,0.18);
      background:
        radial-gradient(circle at 12% 10%, rgba(79,70,229,0.24), transparent 24%),
        radial-gradient(circle at 88% 16%, rgba(34,211,238,0.14), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(168,85,247,0.12), transparent 28%),
        linear-gradient(155deg, #030712 0%, #0b1120 45%, #111827 100%);
    }

    .app-shell {
      width: 100%;
      max-width: 950px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .brand {
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .brand h1 {
      margin:0;
      font-size: clamp(34px, 5vw, 58px);
      line-height:0.95;
      letter-spacing: 0.08em;
      font-weight: 1000;
      background: linear-gradient(135deg, var(--primary), var(--primary-2) 55%, var(--primary-3));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow: 0 10px 30px rgba(109,93,252,.15);
    }

    .subtitle {
      margin:0;
      color: var(--muted);
      font-size: 14px;
    }

    .theme-toggle {
      position: static;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 800;
      box-shadow: var(--shadow);
      transition: transform .18s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--soft-glow); }

    .glass-card,
    .question-box,
    .menu {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .menu {
      text-align: left;
      border-radius: 28px;
      padding: 22px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .menu::before {
      content:"";
      position:absolute;
      inset:auto -60px -60px auto;
      width:220px;
      height:220px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(109,93,252,.18), transparent 65%);
      pointer-events:none;
    }

    .menu-grid {
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
      gap: 18px;
      position:relative;
      z-index:1;
    }

    .menu-section {
      background: linear-gradient(180deg, rgba(255,255,255,0.48), rgba(255,255,255,0.32));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    body.dark .menu-section {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .menu-section strong {
      display:block;
      margin-bottom: 12px;
      font-size: 15px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .menu button,
    .controls button,
    .action-btn {
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      transition: transform .16s ease, filter .2s ease, opacity .2s ease, box-shadow .2s ease;
    }

    .menu button:hover,
    .controls button:hover,
    .action-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
      box-shadow: 0 16px 32px rgba(15,23,42,.14);
    }

    .menu button:active,
    .controls button:active,
    .action-btn:active,
    .answer:active { transform: scale(0.985); }

    .menu button {
      width: 100%;
      margin: 8px 0 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      box-shadow: 0 14px 30px rgba(109,93,252,.22);
    }

    .menu button.secondary {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      box-shadow: 0 14px 30px rgba(14,165,233,.18);
    }

    .menu button.ghost {
      background: linear-gradient(135deg, #334155, #475569);
      box-shadow: 0 14px 30px rgba(51,65,85,.18);
    }

    .question-box {
      border-radius: 30px;
      padding: 26px;
      animation: fadeUp .35s ease;
      position: relative;
      overflow: hidden;
    }

    .question-box::after {
      content:"";
      position:absolute;
      inset:auto -40px -70px auto;
      width:180px;
      height:180px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(34,211,238,.12), transparent 65%);
      pointer-events:none;
    }

    .question-meta {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 12px;
      flex-wrap:wrap;
      margin-bottom: 18px;
      position:relative;
      z-index:1;
    }

    .pill {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 13px;
      border-radius:999px;
      background: rgba(99,102,241,0.12);
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .03em;
      border: 1px solid rgba(99,102,241,.12);
    }

    body.dark .pill {
      background: rgba(129,140,248,0.14);
      color: #dbe3ff;
    }

    .score-badge {
      background: rgba(34,197,94,0.12);
      color: #15803d;
      border-color: rgba(34,197,94,.16);
    }

    body.dark .score-badge { color: #86efac; }

    .question-box h3 {
      margin: 0 0 18px;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.35;
      position:relative;
      z-index:1;
    }

    .answers-grid {
      display:grid;
      gap: 12px;
      position:relative;
      z-index:1;
    }

    .answer {
      display: block;
      width: 100%;
      margin: 0;
      padding: 16px 18px;
      border: 1px solid rgba(99,102,241,0.08);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.38));
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .16s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .answer:hover {
      background: linear-gradient(180deg, rgba(109,93,252,0.10), rgba(34,211,238,0.08));
      border-color: rgba(109,93,252,.22);
      box-shadow: 0 12px 22px rgba(109,93,252,.10);
    }

    body.dark .answer {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border-color: rgba(148,163,184,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    body.dark .answer:hover {
      background: linear-gradient(180deg, rgba(109,93,252,0.14), rgba(34,211,238,0.08));
      border-color: rgba(129,140,248,.22);
    }

    .answer-letter {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      margin-right: 12px;
      background: linear-gradient(135deg, rgba(109,93,252,.14), rgba(34,211,238,.12));
      color: var(--primary);
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    }

    body.dark .answer-letter {
      background: linear-gradient(135deg, rgba(109,93,252,.20), rgba(34,211,238,.12));
      color: #dbe3ff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .correct {
      background: linear-gradient(135deg, rgba(34,197,94,0.20), rgba(34,197,94,0.10)) !important;
      color: #166534 !important;
      border-color: rgba(34,197,94,0.34) !important;
      box-shadow: 0 14px 26px rgba(34,197,94,.12) !important;
    }

    .wrong {
      background: linear-gradient(135deg, rgba(239,68,68,0.20), rgba(239,68,68,0.10)) !important;
      color: #991b1b !important;
      border-color: rgba(239,68,68,0.30) !important;
      box-shadow: 0 14px 26px rgba(239,68,68,.10) !important;
    }

    body.dark .correct { color: #bbf7d0 !important; }
    body.dark .wrong { color: #fecaca !important; }

    .controls {
      margin-top: 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 12px;
      flex-wrap: wrap;
      position:relative;
      z-index:1;
    }

    .left-actions,
    .right-actions {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .next-btn {
      background: linear-gradient(135deg, #f59e0b, #f97316) !important;
      color: white !important;
      box-shadow: 0 14px 28px rgba(245,158,11,.24);
    }

    .exit-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
      color: white !important;
      box-shadow: 0 14px 28px rgba(239,68,68,.20);
    }

    .ghost-btn {
      background: linear-gradient(135deg, #64748b, #475569) !important;
      color: white !important;
      box-shadow: 0 14px 28px rgba(100,116,139,.16);
    }

    .progress-bar {
      background: rgba(148,163,184,0.14);
      border-radius: 999px;
      overflow: hidden;
      width: 100%;
      height: 18px;
      margin: 14px 0 0;
      border: 1px solid rgba(148,163,184,.10);
    }
.answer:hover {
  box-shadow: 0 0 15px rgba(0,123,255,0.7);
}
    .progress {
      background: linear-gradient(90deg, #22c55e, #06b6d4, #6366f1);
      background-size: 180% 180%;
      animation: flow 5s ease infinite;
      color: white;
      text-align: center;
      height: 100%;
      font-size: 11px;
      line-height: 16px;
      font-weight: 900;
      transition: width .35s ease;
      white-space: nowrap;
    }
    .answer {
  padding: 15px;
  font-size: 18px;
}
.correct {
  animation: flashGreen 0.5s;
}

@keyframes flashGreen {
  0% { background: white; }
  100% { background: #28a745; }
}

    .stats-grid {
      display:grid;
      gap: 14px;
      margin-top: 18px;
    }

    .stat-card {
      border:1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.52), rgba(255,255,255,0.34));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.42);
    }

    body.dark .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .stat-card h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .stat-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-size: 14px;
      margin: 10px 0;
    }

    .empty-state {
      text-align:center;
      padding: 24px 16px;
      color: var(--muted);
    }

    .helper-text {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .hidden { display:none !important; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px) scale(.985); }
      to { opacity:1; transform: translateY(0) scale(1); }
    }

    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }



    body.in-quiz #homeMenu { display: none; }

    body.in-quiz .app-shell {
      max-width: 980px;
    }

    body.in-quiz #quiz {
      margin-top: 0 !important;
    }

    body.in-quiz .question-box {
      min-height: calc(100vh - 150px);
      display: flex;
      flex-direction: column;
    }

    body.in-quiz .answers-grid {
      flex: 1;
      align-content: start;
    }

    body.in-quiz .controls {
      margin-top: auto;
      padding-top: 16px;
    }

    .answer {
      line-height: 1.45;
      word-break: break-word;
    }

    @media (min-width: 901px) {
      body.in-quiz {
        padding-top: 18px;
        padding-bottom: 24px;
      }

      body.in-quiz .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 8px 0 14px;
        margin-bottom: 14px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      body.in-quiz .brand h1 {
        font-size: clamp(24px, 2.4vw, 36px);
      }

      body.in-quiz .subtitle {
        display: none;
      }

      body.in-quiz .question-box {
        padding: 22px;
      }
    }

    @media (max-width: 900px) {
      body.in-quiz .question-box {
        min-height: auto;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 16px 12px 28px;
      }

      .app-shell {
        max-width: 100%;
      }

      .topbar {
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }

      .brand {
        width: 100%;
      }

      .brand h1 {
        font-size: clamp(26px, 8vw, 34px);
        line-height: 1.05;
        letter-spacing: 0.04em;
        word-break: break-word;
      }

      .subtitle {
        font-size: 12px;
      }

      .theme-toggle {
        width: 100%;
        justify-content: center;
        text-align: center;
      }

      .menu,
      .question-box {
        padding: 16px;
        border-radius: 22px;
      }

      .menu-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .menu-section {
        padding: 16px;
      }

      .menu button,
      .controls button,
      .action-btn {
        width: 100%;
        min-height: 48px;
        font-size: 15px;
      }

      .question-meta {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .pill {
        width: 100%;
        justify-content: center;
        text-align: center;
      }

      .question-box h3 {
        font-size: 19px;
        line-height: 1.4;
        margin-bottom: 14px;
      }

      .answers-grid {
        gap: 10px;
      }

      .answer {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 15px;
        font-size: 15px;
        line-height: 1.4;
        white-space: normal;
      }

      .answer-letter {
        flex: 0 0 30px;
        width: 30px;
        height: 30px;
        margin-right: 0;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .left-actions,
      .right-actions {
        width: 100%;
        flex-direction: column;
        gap: 10px;
      }

      .left-actions button,
      .right-actions button {
        width: 100%;
        flex: none;
      }

      .progress-bar {
        height: 16px;
      }

      .progress {
        font-size: 10px;
        line-height: 14px;
      }

      body.in-quiz {
        padding-top: 12px;
      }

      body.in-quiz .topbar {
        position: static;
        padding: 0;
        margin-bottom: 12px;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      body.in-quiz .question-box {
        min-height: auto;
      }
    }

    @media (max-width: 420px) {
      body {
        padding-left: 10px;
        padding-right: 10px;
      }

      .brand h1 {
        font-size: 24px;
      }

      .menu,
      .question-box,
      .menu-section {
        padding: 14px;
        border-radius: 18px;
      }

      .question-box h3 {
        font-size: 18px;
      }

      .answer {
        font-size: 14px;
        padding: 13px 14px;
      }

      .answer-letter {
        flex-basis: 28px;
        width: 28px;
        height: 28px;
      }
    }
  </style>

</head>

<body>
<div class="app-shell">
  <div class="topbar">
    <div class="brand">
      <h1>JÁTÉKVEZETŐI TRIVIA</h1>
      <p class="subtitle">EREDMÉNYES FELKÉSZÜLÉST</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Téma</button>
  </div>

  <div class="menu" id="homeMenu">
    <div class="menu-grid">
      <div class="menu-section">
        <strong>Játékmódok</strong>
        <button onclick="startTestMode()">Teszt mód (25 random)</button>
        <button onclick="startHardTestMode()">Nehéz teszt (25 random)</button>
        <button class="secondary" onclick="startPracticeMode()">Gyakorlás (összes kérdés)</button>
      </div>
      <div class="menu-section">
        <strong>Eredmények</strong>
        <button class="ghost" onclick="showStatistics()">Eredmények megtekintése</button>
        <button class="ghost" onclick="clearTestResults()">Teszteredmények törlése</button>
        <div class="helper-text">Tipp: Enter = tovább, 1-4 = válasz, D = sötét mód</div>
      </div>
    </div>
  </div>

  <div id="quiz" style="margin-top: 18px;"></div>
</div>

<script>

const questions = [
  {
    id: 1,
    question: "Milyen messze van a büntetõpont a kapuvonaltól?",
    answers: {
      a: "10 méter (11 yard).",
      b: "11 méter (12 yard).",
      c: "9 méter (10 yard).",
      d: "12 méter (13 yard)."
    },
    correct: "b"
  },
  {
    id: 2,
    question: "Mennyi egy hagyományos játéktér minimális szélessége?",
    answers: {
      a: "45 méter (50 yard).",
      b: "50 méter (55 yard).",
      c: "40 méter (45 yard).",
      d: "55 méter (60 yard)."
    },
    correct: "a"
  },
  {
    id: 3,
    question: "Hálók",
    answers: {
      a: "rögzítendõk.",
      b: "használhatók a kapukhoz, de ez a FIFA Minõség Program elõírásaitól függ.",
      c: "rögzíthetõk a kapukhoz és a kapu mögött a talajhoz, megfelelõen kifeszítve, úgy, hogy ne akadályozzák a kapust.",
      d: "szükségesek."
    },
    correct: "c"
  },
  {
    id: 4,
    question: "Jelölje meg, hogy melyik állítás nem igaz a labdával kapcsolatban:",
    answers: {
      a: "gömbölyû.",
      b: "a kerülete 70 cm-nél nem több és 68 cm-nél nem kevesebb.",
      c: "súlya a mérkõzés kezdetén nem több 450g-nál és nem kevesebb 420g-nál.",
      d: "megfelelõ anyagból készül."
    },
    correct: "c"
  },
  {
    id: 5,
    question: "Zászlórudak",

let currentIndex = 0;
let currentMode = 'practice';
let selectedQuestions = [];
let correctCount = 0;
let answeredCurrent = false;

const hardIntervals = [
    [53,92],
    [141,203],
    [225,256],
    [291,339],
    [354,377],
    [424,472],
    [502,566],
    [588,633],
    [730,899],
    [926,964],
    [982,1019],
    [1069,1134]
];

function isHardQuestion(id) {
  return hardIntervals.some(([start, end]) => id >= start && id <= end);
}

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function saveTheme(theme) {
  localStorage.setItem("quizTheme", theme);
}

function applySavedTheme() {
  const saved = localStorage.getItem("quizTheme");
  if (saved === "dark") document.body.classList.add("dark");
}

function toggleTheme() {
  document.body.classList.toggle("dark");
  saveTheme(document.body.classList.contains("dark") ? "dark" : "light");
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function getModeLabel() {
  if (currentMode === 'test') return 'Teszt mód';
  if (currentMode === 'hardtest') return 'Nehéz teszt';
  return 'Gyakorlás';
}

function setQuizMode(active) {
  document.body.classList.toggle("in-quiz", !!active);
}

function startTestMode() {
  currentMode = 'test';
  selectedQuestions = shuffle(questions).slice(0, 25);
  currentIndex = 0;
  correctCount = 0;
  answeredCurrent = false;
  setQuizMode(true);
  renderQuestion();
}

function startHardTestMode() {
  currentMode = 'hardtest';
  const hardQuestions = questions.filter(q => isHardQuestion(q.id));
  selectedQuestions = shuffle(hardQuestions).slice(0, 25);
  currentIndex = 0;
  correctCount = 0;
  answeredCurrent = false;
  setQuizMode(true);
  renderQuestion();
}

function startPracticeMode() {
  currentMode = 'practice';
  selectedQuestions = [...questions];
  const savedProgress = parseInt(localStorage.getItem("quizProgress") || "0", 10);
  const defaultStart = Number.isFinite(savedProgress) && savedProgress >= 0 ? Math.min(savedProgress + 1, selectedQuestions.length) : 1;
  const startIndex = parseInt(prompt("Hányadik kérdéstől szeretnéd kezdeni? (1-" + selectedQuestions.length + ")", String(defaultStart)), 10);
  currentIndex = (isNaN(startIndex) || startIndex < 1 || startIndex > selectedQuestions.length) ? Math.max(0, defaultStart - 1) : startIndex - 1;
  correctCount = 0;
  answeredCurrent = false;
  localStorage.setItem("quizProgress", currentIndex);
  setQuizMode(true);
  renderQuestion();
}

function clearTestResults() {
  localStorage.removeItem("testResults");
  localStorage.removeItem("hardTestResults");
  alert("A korábbi teszteredmények törölve.");
  if (!selectedQuestions.length || currentIndex >= selectedQuestions.length) {
    showStatistics();
  }
}

function saveResult(key, percentage) {
  let results = JSON.parse(localStorage.getItem(key) || "[]");
  results.push(percentage);
  if (results.length > 10) results = results.slice(-10);
  localStorage.setItem(key, JSON.stringify(results));
}

function getColorForPercentage(p) {
  let r, g;
  if (p < 50) {
    r = 255;
    g = Math.round(5.1 * p);
  } else {
    g = 255;
    r = Math.round(510 - 5.1 * p);
  }
  return `rgb(${r},${g},40)`;
}

function progressBar(value, max = 100) {
  const percent = Math.max(0, Math.min(100, (value / max) * 100));
  const color = getColorForPercentage(percent);
  return `
    <div class="progress-bar">
      <div class="progress" style="width:${percent}%; background:${color};">${Math.round(percent)}%</div>
    </div>`;
}

function average(values) {
  if (!values.length) return 0;
  return Math.round(values.reduce((a,b) => a + b, 0) / values.length);
}

function best(values) {
  return values.length ? Math.max(...values) : 0;
}

function renderResultsSummary() {
  const normal = JSON.parse(localStorage.getItem("testResults") || "[]");
  const hard = JSON.parse(localStorage.getItem("hardTestResults") || "[]");
  const practiceProgress = localStorage.getItem("quizProgress");

  let html = '<div class="stats-grid">';

  html += `
    <div class="stat-card">
      <h3>Normál tesztek</h3>
      ${normal.length ? normal.map((r, i) => `
        <div class="stat-row"><span>${i + 1}. teszt</span><strong>${r}%</strong></div>
        ${progressBar(r)}
      `).join("") : '<div class="empty-state">Még nincs mentett normál teszt.</div>'}
      ${normal.length ? `<div class="helper-text">Átlag: ${average(normal)}% • Legjobb: ${best(normal)}%</div>` : ''}
    </div>`;

  html += `
    <div class="stat-card">
      <h3>Nehéz tesztek</h3>
      ${hard.length ? hard.map((r, i) => `
        <div class="stat-row"><span>${i + 1}. nehéz teszt</span><strong>${r}%</strong></div>
        ${progressBar(r)}
      `).join("") : '<div class="empty-state">Még nincs mentett nehéz teszt.</div>'}
      ${hard.length ? `<div class="helper-text">Átlag: ${average(hard)}% • Legjobb: ${best(hard)}%</div>` : ''}
    </div>`;

  const value = practiceProgress !== null ? parseInt(practiceProgress, 10) : null;
  const max = questions.length;
  const percent = value !== null ? Math.round((value / max) * 100) : 0;
  html += `
    <div class="stat-card">
      <h3>Gyakorlás előrehaladás</h3>
      ${value !== null
        ? `<div class="stat-row"><span>Mentett állás</span><strong>${Math.min(value, max)}/${max}</strong></div>${progressBar(percent)}`
        : '<div class="empty-state">Még nincs mentett gyakorlási állás.</div>'}
    </div>`;

  html += '</div>';
  return html;
}

function showStatistics() {
  answeredCurrent = false;
  setQuizMode(true);
  document.getElementById("quiz").innerHTML = `
    <div class="question-box">
      <div class="question-meta">
        <span class="pill">📊 Eredmények</span>
        <span class="pill score-badge">Összes kérdés: ${questions.length}</span>
      </div>
      <h3>Eddigi statisztikáid</h3>
      ${renderResultsSummary()}
      <div class="controls">
        <div class="left-actions">
          <button class="ghost-btn" onclick="goHome()">Főmenü</button>
        </div>
      </div>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCompletion() {
  setQuizMode(true);
  if (currentMode === 'test' || currentMode === 'hardtest') {
    const total = selectedQuestions.length;
    const percentage = Math.round((correctCount / total) * 100);
    const key = currentMode === 'hardtest' ? "hardTestResults" : "testResults";
    saveResult(key, percentage);

    let message = "Szép munka!";
    let followupMessage = "";
    if (percentage >= 90) message = "Brutális eredmény! 🔥";
    else if (percentage >= 85) message = "Nagyon erős lett 👏";
    else {
      message = "Még foglalkozz vele!";
      followupMessage = "A sikeres szinthez legalább 85% kell, úgyhogy érdemes még gyakorolni.";
    }

    document.getElementById("quiz").innerHTML = `
      <div class="question-box">
        <div class="question-meta">
          <span class="pill">🏁 ${escapeHtml(getModeLabel())} vége</span>
          <span class="pill score-badge">Pontszám: ${correctCount}/${total}</span>
        </div>
        <h3>${message}</h3>
        ${followupMessage ? `<p class="helper-text" style="margin-top: 10px;">${followupMessage}</p>` : ""}
        <div class="stat-card">
          <div class="stat-row"><span>Találati arány</span><strong>${percentage}%</strong></div>
          ${progressBar(percentage)}
        </div>
        <div class="controls">
          <div class="left-actions">
            <button class="ghost-btn" onclick="goHome()">Főmenü</button>
            <button class="ghost-btn" onclick="showStatistics()">Statisztika</button>
          </div>
          <div class="right-actions">
            <button class="next-btn" onclick="${currentMode === 'hardtest' ? 'startHardTestMode()' : 'startTestMode()'}">Újra</button>
          </div>
        </div>
      </div>`;
  } else {
    document.getElementById("quiz").innerHTML = `
      <div class="question-box">
        <div class="question-meta">
          <span class="pill">🎉 Gyakorlás vége</span>
          <span class="pill score-badge">Végigértél az összes kérdésen</span>
        </div>
        <h3>Nincs több kérdés!</h3>
        <div class="controls">
          <div class="left-actions">
            <button class="ghost-btn" onclick="goHome()">Főmenü</button>
            <button class="ghost-btn" onclick="showStatistics()">Statisztika</button>
          </div>
          <div class="right-actions">
            <button class="next-btn" onclick="startPracticeMode()">Újrakezdés</button>
          </div>
        </div>
      </div>`;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestion() {
  const q = selectedQuestions[currentIndex];
  if (!q) {
    renderCompletion();
    return;
  }

  answeredCurrent = false;
  const total = selectedQuestions.length;
  const progress = currentMode === 'practice' ? currentIndex : currentIndex;
  const progressPercent = total ? Math.round((progress / total) * 100) : 0;

  let html = `
    <div class="question-box">
      <div class="question-meta">
        <span class="pill">🎯 ${escapeHtml(getModeLabel())}</span>
        <span class="pill">Kérdés ${currentIndex + 1} / ${total}</span>
        ${(currentMode === 'test' || currentMode === 'hardtest') ? `<span class="pill score-badge">Pont: ${correctCount}</span>` : ''}
      </div>

      ${progressBar(progressPercent)}

      <h3>${currentIndex + 1}. ${escapeHtml(q.question)}</h3>
      <div class="answers-grid">`;

  for (const key in q.answers) {
    html += `
      <button class="answer" data-key="${key}" onclick="checkAnswer('${key}')">
        <span class="answer-letter">${key.toUpperCase()}</span>${escapeHtml(q.answers[key])}
      </button>`;
  }

  html += `
      </div>
      <div class="controls">
        <div class="left-actions">
          <button class="ghost-btn" onclick="showStatistics()">Statisztika</button>
          <button class="exit-btn" onclick="goHome()">Kilépés</button>
        </div>
        <div class="right-actions">
          <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Tovább</button>
        </div>
      </div>
    </div>`;

  document.getElementById("quiz").innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function checkAnswer(selected) {
  const q = selectedQuestions[currentIndex];
  if (!q || answeredCurrent) return;

  const buttons = document.querySelectorAll('.answer');
  let isCorrect = false;

  buttons.forEach(btn => {
    const key = btn.dataset.key;
    if (key === q.correct) {
      btn.classList.add("correct");
      if (key === selected) isCorrect = true;
    } else if (key === selected) {
      btn.classList.add("wrong");
    }
    btn.disabled = true;
  });

  answeredCurrent = true;
  document.getElementById("nextBtn").disabled = false;

  if ((currentMode === 'test' || currentMode === 'hardtest') && isCorrect) {
    correctCount++;
  }

  if (currentMode === 'practice') {
    localStorage.setItem("quizProgress", currentIndex + 1);
  }
}

function nextQuestion() {
  if (!answeredCurrent) return;
  currentIndex++;
  renderQuestion();
}

function goHome() {
  setQuizMode(false);
  selectedQuestions = [];
  currentIndex = 0;
  correctCount = 0;
  answeredCurrent = false;
  document.getElementById("quiz").innerHTML = "";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.addEventListener("keydown", (e) => {
  const key = e.key.toLowerCase();

  if (["1","2","3","4"].includes(key)) {
    const map = { "1": "a", "2": "b", "3": "c", "4": "d" };
    const btn = document.querySelector(`.answer[data-key="${map[key]}"]`);
    if (btn && !btn.disabled) checkAnswer(map[key]);
  }

  if (key === "enter") {
    const nextBtn = document.getElementById("nextBtn");
    if (nextBtn && !nextBtn.disabled) nextQuestion();
  }

  if (key === "d") {
    toggleTheme();
  }
});

applySavedTheme();
</script>
